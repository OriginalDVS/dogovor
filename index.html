>

  <button class="btn-create" onclick="createContract()">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
    СОЗДАТЬ ДОГОВОР И СКАЧАТЬ
  </button>
</div>

<!-- Точка статуса шаблона (красная = нет шаблона, нажми чтобы выбрать; зелёная = загружен) -->
<div class="tpl-dot loading" id="tplDot" title="Шаблон не загружен — нажмите чтобы выбрать файл" onclick="dotClick()"></div>

<script>
// ─── Загрузка шаблона ────────────────────────────────────────────────────
let templateBuffer = null;

function setDot(state) {
  const dot = document.getElementById('tplDot');
  dot.className = 'tpl-dot ' + state;
  dot.title = state === 'fail' ? 'Шаблон не найден — нажмите чтобы выбрать файл'
            : state === 'ok'   ? 'Шаблон загружен' : '';
}

function dotClick() {
  if (!templateBuffer) document.getElementById('manualFile').click();
}

async function loadTemplate() {
  setDot('loading');
  try {
    const resp = await fetch('./shablon_dogovora.docx');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    templateBuffer = await resp.arrayBuffer();
    setDot('ok');
  } catch (e) { setDot('fail'); }
}

function onManualFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { templateBuffer = e.target.result; setDot('ok'); };
  reader.readAsArrayBuffer(file);
}

loadTemplate();

// ─── Дата ────────────────────────────────────────────────────────────────
function toggleDate() {
  document.getElementById('dateInputWrap').style.display =
    document.getElementById('hasDate').checked ? 'block' : 'none';
}

// ─── Клиент ──────────────────────────────────────────────────────────────
function toggleClient() {
  const on = document.getElementById('hasClient').checked;
  document.getElementById('clientFields').style.display = on ? 'block' : 'none';
  if (!on) {
    ['clientName','clientBirthDate','passportNumber','passportDate',
     'passportCode','passportBy','address'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('error');
      const err = document.getElementById('err-' + id);
      if (err) err.classList.remove('visible');
    });
  }
}

// ─── Число прописью ──────────────────────────────────────────────────────
const ones  = ['','один','два','три','четыре','пять','шесть','семь','восемь','девять',
               'десять','одиннадцать','двенадцать','тринадцать','четырнадцать','пятнадцать',
               'шестнадцать','семнадцать','восемнадцать','девятнадцать'];
const tens  = ['','','двадцать','тридцать','сорок','пятьдесят',
               'шестьдесят','семьдесят','восемьдесят','девяносто'];
const hunds = ['','сто','двести','триста','четыреста','пятьсот',
               'шестьсот','семьсот','восемьсот','девятьсот'];
const onesF = ['','одна','две','три','четыре','пять','шесть','семь','восемь','девять',
               'десять','одиннадцать','двенадцать','тринадцать','четырнадцать','пятнадцать',
               'шестнадцать','семнадцать','восемнадцать','девятнадцать'];

function threeDigits(n, fem) {
  if (!n) return '';
  let h = Math.floor(n/100), rest = n%100, t = Math.floor(rest/10), o = rest%10, p = [];
  if (h) p.push(hunds[h]);
  if (rest < 20) { if (rest) p.push(fem ? onesF[rest] : ones[rest]); }
  else { if (t) p.push(tens[t]); if (o) p.push(fem ? onesF[o] : ones[o]); }
  return p.join(' ');
}
function thousandWord(n) {
  let l2=n%100, l1=n%10;
  if(l2>=11&&l2<=19) return 'тысяч';
  if(l1===1) return 'тысяча';
  if(l1>=2&&l1<=4) return 'тысячи';
  return 'тысяч';
}
function numToWords(n) {
  if(!n) return 'ноль';
  let p=[],th=Math.floor(n/1000),rem=n%1000;
  if(th){let t=threeDigits(th,true);if(t)p.push(t);p.push(thousandWord(th));}
  if(rem){let r=threeDigits(rem,false);if(r)p.push(r);}
  return p.join(' ');
}
function formatNum(n) { return n.toLocaleString('ru-RU'); }

// ─── Предпросмотр цены ───────────────────────────────────────────────────
function updatePrice() {
  const raw = document.getElementById('price').value.replace(/\D/g,'');
  const tax = document.getElementById('addTax').checked;
  const preview = document.getElementById('pricePreview');
  if (!raw) { preview.classList.remove('visible'); return; }
  let price = parseInt(raw, 10);
  if (tax) price = Math.round(price * 1.07);
  preview.classList.add('visible');
  document.getElementById('pricePreviewValue').textContent =
    formatNum(price) + ' (' + numToWords(price) + ') рублей';
}

// ─── Валидация ───────────────────────────────────────────────────────────
function checkField(id) {
  const el = document.getElementById(id);
  if (!el) return true;
  const ok = el.value.trim() !== '';
  el.classList.toggle('error', !ok);
  const err = document.getElementById('err-' + id);
  if (err) err.classList.toggle('visible', !ok);
  return ok;
}

// ─── Заполнение DOCX: прямая замена в XML ────────────────────────────────
// Word разбивает {{переменная}} на несколько XML-фрагментов.
// Сначала склеиваем эти фрагменты, потом делаем замену.

function escXml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Переводим \n в Word-перенос строки (внутри <w:r>)
function toXmlVal(str) {
  return escXml(str).split('\n')
    .join('</w:t><w:br/><w:t xml:space="preserve">');
}

function fillDocx(buffer, data) {
  const zip = new PizZip(buffer);
  let xml = zip.file('word/document.xml').asText();

  // Шаг 1: склеиваем {{ разбитые XML-тегами (напр. <w:r>{ + <w:r>{)
  xml = xml.replace(/\{(<[^>]*>)*\{/g, '{{');
  // Шаг 2: склеиваем }}
  xml = xml.replace(/\}(<[^>]*>)*\}/g, '}}');
  // Шаг 3: убираем XML-теги внутри {{ ... }} (мог остаться тег переноса)
  xml = xml.replace(/\{\{[\s\S]*?\}\}/g, m => m.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim());

  // Шаг 4: заменяем каждую переменную
  for (const [key, val] of Object.entries(data)) {
    const re = new RegExp('\\{\\{\\s*' + key.replace(/_/g, '[_\\s]') + '\\s*\\}\\}', 'g');
    xml = xml.replace(re, toXmlVal(val));
  }

  zip.file('word/document.xml', xml);
  return zip.generate({
    type: 'blob',
    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
  });
}

// ─── Константы клиента ───────────────────────────────────────────────────
const CLIENT_EMPTY   = '_________________________________________________________________________\n___________________________________________________________________________________________________________________________________________________________________________________________';
const CLIENT_EMPTY_2 = '\n\n\n\n';

// ─── Создание договора ───────────────────────────────────────────────────
function createContract() {
  if (!templateBuffer) {
    alert('Шаблон ещё не загружен. Нажмите на точку в правом нижнем углу чтобы выбрать файл.');
    return;
  }

  let valid = true;
  ['contractNumber','engineModel','engineVolume','engineSerial','price']
    .forEach(id => { if (!checkField(id)) valid = false; });

  const hasClient = document.getElementById('hasClient').checked;
  if (hasClient) {
    ['clientName','clientBirthDate','passportNumber','passportDate',
     'passportCode','passportBy','address']
      .forEach(id => { if (!checkField(id)) valid = false; });
  }

  if (!valid) {
    document.querySelector('.section').scrollIntoView({ behavior:'smooth', block:'start' });
    return;
  }

  const hasDate     = document.getElementById('hasDate').checked;
  const date        = hasDate ? (document.getElementById('contractDate').value.trim() || '__________') : '__________';
  const contractNum = document.getElementById('contractNumber').value.trim();
  const model       = document.getElementById('engineModel').value.trim();
  const vol         = document.getElementById('engineVolume').value.trim();
  const serial      = document.getElementById('engineSerial').value.trim();
  const engineFull  = model + ' ' + vol + ' л';

  const rawPrice   = parseInt(document.getElementById('price').value.replace(/\D/g,''), 10);
  const tax        = document.getElementById('addTax').checked;
  const finalPrice = tax ? Math.round(rawPrice * 1.07) : rawPrice;
  const priceFull  = formatNum(finalPrice) + ' (' + numToWords(finalPrice) + ')';

  let clientFull, clientFull2, address;
  if (hasClient) {
    const name  = document.getElementById('clientName').value.trim();
    const bday  = document.getElementById('clientBirthDate').value.trim();
    const pnum  = document.getElementById('passportNumber').value.trim();
    const pdate = document.getElementById('passportDate').value.trim();
    const pby   = document.getElementById('passportBy').value.trim();
    const pcode = document.getElementById('passportCode').value.trim();
    address     = document.getElementById('address').value.trim();
    clientFull  = `${name}, ${bday} г.р., паспорт ${pnum}, выдан ${pdate} ${pby}, ${pcode}`;
    clientFull2 = clientFull;
  } else {
    clientFull  = CLIENT_EMPTY;
    clientFull2 = CLIENT_EMPTY_2;
    address     = '';
  }

  const data = {
    contract_num:  contractNum,
    date:          date,
    client_full:   clientFull,
    client_full_2: clientFull2,
    address:       address,
    engine_full:   engineFull,
    engine_number: serial,
    price_full:    priceFull,
  };

  try {
    const clientName = hasClient ? document.getElementById('clientName').value.trim() : '';
    const fname = 'Договор_№' + contractNum + (clientName ? '_' + clientName : '') + '.docx';
    const blob = fillDocx(templateBuffer, data);
    saveAs(blob, fname);
  } catch (e) {
    console.error(e);
    alert('Ошибка при заполнении шаблона:\n' + e.message);
  }
}
</script>
</body>
</html>
